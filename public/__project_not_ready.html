<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Project not ready</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(900px circle at 20% 10%, rgba(56, 189, 248, 0.18), transparent 60%),
          radial-gradient(900px circle at 80% 0%, rgba(168, 85, 247, 0.16), transparent 55%),
          #0b1020;
        color: rgba(255, 255, 255, 0.92);
        font: 500 14px/1.6 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        padding: 18px 18px 16px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 6px;
        font: 700 16px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 10px;
        color: rgba(226, 232, 240, 0.9);
      }
      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(2, 6, 23, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.16);
        color: rgba(226, 232, 240, 0.95);
      }
      a {
        color: rgba(56, 189, 248, 0.95);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.18);
        color: rgba(255, 255, 255, 0.9);
        font-weight: 650;
      }
      .btn:hover {
        background: rgba(2, 6, 23, 0.78);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>這個專案暫時還沒準備好</h1>
      <p>
        你正在瀏覽 <code>/p/&lt;project&gt;/</code>，但後端的 demo container 可能尚未啟動，或正在更新中。
      </p>
      <div class="actions">
        <a class="btn" href="/">回到作品集首頁</a>
        <a class="btn" href="/projects">瀏覽所有專案</a>
      </div>
      <p style="margin-top: 10px; opacity: 0.9">
        如果你是站長：請在 server 上執行 <code>docker-compose up -d --build &lt;service&gt;</code>。
      </p>
    </main>
  </body>
</html>
