services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SITE_URL: "${SITE_URL:-http://localhost:3000}"
    environment:
      SITE_URL: "${SITE_URL:-http://localhost:3000}"
    ports:
      - "${WEB_HOST_PORT:-3000}:80"
    restart: unless-stopped

  # Project demos (mounted under /p/<slug>/ via the portfolio nginx gateway).
  # Note: these build contexts are expected to exist (e.g. on the server):
  #   ./projects/<slug>  (repo checkout)
  threejs-product-viewer:
    build:
      context: ./projects/threejs-product-viewer
      dockerfile: docker/Dockerfile
      args:
        BASE_PATH: "/p/threejs-product-viewer/"
    expose:
      - "80"
    restart: unless-stopped

