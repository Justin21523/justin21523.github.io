services:
  web:
    build:
      context: .
    image: justin-portfolio-web
    ports:
      - "3000:80"
    depends_on:
      - agentic-bi-dataops-copilot
      - agentic-bi-dataops-copilot-api
      - information-retrieval
      - fandom-gui-scraper
      - nyc-taxi-mobility-analytics
      - amazon-review-intelligence
      - amazon-review-intelligence-api
      - dcard-trending-crawler
      - dcard-trending-crawler-api
      - excel-python-data-analysis
      - ir-rag-evaluation-lab
      - ir-rag-evaluation-lab-api
      - lyrics-cultural-analytics-lab-frontend
      - lyrics-cultural-analytics-lab-backend
      - music-intelligence-platform
      - music-intelligence-platform-api
      - openalex-research-rag
      - openalex-research-rag-api
      - retailpulse-bi-recommender
      - retailpulse-bi-recommender-api
      - news-web-crawler
      - news-web-crawler-api
    restart: unless-stopped

  agentic-bi-dataops-copilot-api:
    build:
      context: ../agentic-bi-dataops-copilot
      dockerfile: Dockerfile
    image: justin-portfolio-agentic-bi-dataops-copilot-api
    environment:
      PYTHONPATH: /app/src
      DUCKDB_PATH: data/warehouse.duckdb
    volumes:
      - ../agentic-bi-dataops-copilot/data:/app/data
    restart: unless-stopped

  agentic-bi-dataops-copilot:
    build:
      context: ../agentic-bi-dataops-copilot/frontend
      dockerfile: Dockerfile.frontend
    image: justin-portfolio-agentic-bi-dataops-copilot
    depends_on:
      - agentic-bi-dataops-copilot-api
    restart: unless-stopped

  information-retrieval:
    build:
      context: ../information-retrieval
    image: justin-portfolio-information-retrieval
    environment:
      FLASK_DEBUG: "0"
      IR_HOST: "0.0.0.0"
      IR_PORT: "80"
      PORT: "80"
      IR_DATASET_PATH: "/app/data/processed/unified_news_corpus_full.jsonl"
      IR_INDEX_DIR: "/app/data/indexes"
      IR_ENABLE_HEAVY_MODELS: "false"
      IR_TOKENIZER_ENGINE: "jieba"
      IR_MAX_DOCUMENTS: "25000"
      HF_HOME: "/data/hf"
      TRANSFORMERS_CACHE: "/data/hf"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ir_hf_cache:/data/hf
    restart: unless-stopped

  fandom-gui-scraper:
    build:
      context: ../fandom-gui-scraper
      dockerfile: docker/portfolio.Dockerfile
    image: justin-portfolio-fandom-gui-scraper
    environment:
      AUTH_DISABLED: "true"
      FANDOM_DEMO_MODE: "true"
      FANDOM_DEMO_ROOT: "/app/sample_data"
      ENABLE_FILE_EXPORT: "true"
      DOWNLOAD_IMAGES: "false"
    restart: unless-stopped

  nyc-taxi-mobility-analytics:
    build:
      context: ../nyc-taxi-mobility-analytics
      args:
        NEXT_PUBLIC_BASE_PATH: "/p/nyc-taxi-mobility-analytics"
    image: justin-portfolio-nyc-taxi-mobility-analytics
    environment:
      NEXT_PUBLIC_BASE_PATH: "/p/nyc-taxi-mobility-analytics"
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped

  amazon-review-intelligence-api:
    build:
      context: ../amazon-review-intelligence
      dockerfile: Dockerfile.api
    image: justin-portfolio-amazon-review-intelligence-api
    environment:
      LOG_LEVEL: "INFO"
      DUCKDB_PATH: "/app/data/amazon_reviews.duckdb"
      BM25_INDEX_PATH: "/app/data/bm25_index.joblib"
      DATA_DIR: "/app/data"
      HF_HOME: "/data/hf"
      TRANSFORMERS_CACHE: "/data/hf"
      SENTENCE_TRANSFORMERS_HOME: "/data/hf"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ../amazon-review-intelligence/data:/app/data
      - amazon_review_hf_cache:/data/hf
    restart: unless-stopped

  amazon-review-intelligence:
    build:
      context: ../amazon-review-intelligence/frontend
      args:
        NEXT_PUBLIC_BASE_PATH: "/p/amazon-review-intelligence"
        AMAZON_REVIEW_API_URL: "http://amazon-review-intelligence-api:8000"
    image: justin-portfolio-amazon-review-intelligence
    environment:
      NEXT_PUBLIC_BASE_PATH: "/p/amazon-review-intelligence"
      AMAZON_REVIEW_API_URL: "http://amazon-review-intelligence-api:8000"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - amazon-review-intelligence-api
    restart: unless-stopped

  dcard-trending-crawler-api:
    build:
      context: ../dcard-trending-crawler
      dockerfile: Dockerfile.api
    image: justin-portfolio-dcard-trending-crawler-api
    volumes:
      - ../dcard-trending-crawler/data:/app/data
      - ../dcard-trending-crawler/logs:/app/logs
    restart: unless-stopped

  dcard-trending-crawler:
    build:
      context: ../dcard-trending-crawler/frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: /p/dcard-trending-crawler/
        VITE_API_BASE_URL: /p/dcard-trending-crawler/api
    image: justin-portfolio-dcard-trending-crawler
    depends_on:
      - dcard-trending-crawler-api
    restart: unless-stopped

  excel-python-data-analysis:
    build:
      context: ../excel-python-data-analysis
      dockerfile: Dockerfile
    image: justin-portfolio-excel-python-data-analysis
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.baseUrlPath=projects/excel-python-data-analysis --server.enableCORS=false --server.enableXsrfProtection=false
    restart: unless-stopped

  ir-rag-evaluation-lab-api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../ir-rag-evaluation-lab:/app
    command: sh -c "pip install -e 'backend[dev]' && uvicorn ir_rag_eval.api.main:app --app-dir backend/src --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  ir-rag-evaluation-lab:
    build:
      context: ../ir-rag-evaluation-lab/frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /projects/ir-rag-evaluation-lab/
        VITE_API_BASE_URL: /projects/ir-rag-evaluation-lab/api/v1
    image: justin-portfolio-ir-rag-evaluation-lab
    depends_on:
      - ir-rag-evaluation-lab-api
    restart: unless-stopped

  lyrics-cultural-analytics-lab-backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../lyrics-cultural-analytics-lab:/app
    environment:
      LYRICS_LAB_CORS_ORIGINS: '["https://neojustin.dothost.net"]'
    command: sh -c "pip install -e 'backend[dev]' && python -m lyrics_lab.ingestion.prepare_data && python -m uvicorn lyrics_lab.api.main:app --app-dir backend/src --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  lyrics-cultural-analytics-lab-frontend:
    build:
      context: ../lyrics-cultural-analytics-lab
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_BASE_PATH: /p/lyrics-cultural-analytics-lab/
        VITE_API_BASE_URL: /p/lyrics-cultural-analytics-lab/api/v1
    image: justin-portfolio-lyrics-cultural-analytics-lab-frontend
    depends_on:
      - lyrics-cultural-analytics-lab-backend
    restart: unless-stopped

  music-intelligence-platform-api:
    build:
      context: ../music-intelligence-platform
      dockerfile: Dockerfile
    image: justin-portfolio-music-intelligence-platform-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      DUCKDB_PATH: /app/data/warehouse.duckdb
      LOG_LEVEL: INFO
    volumes:
      - ../music-intelligence-platform/data:/app/data
    restart: unless-stopped

  music-intelligence-platform:
    build:
      context: ../music-intelligence-platform
      dockerfile: Dockerfile.portfolio
    image: justin-portfolio-music-intelligence-platform
    depends_on:
      - music-intelligence-platform-api
    restart: unless-stopped

  openalex-research-rag-api:
    build:
      context: ../openalex-research-rag
      dockerfile: Dockerfile
    image: justin-portfolio-openalex-research-rag-api
    command: uv run uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      PYTHONPATH: /app
      HF_HOME: /app/.cache/huggingface
    volumes:
      - ../openalex-research-rag/data:/app/data
      - ../openalex-research-rag/.cache:/app/.cache
    restart: unless-stopped

  openalex-research-rag:
    build:
      context: ../openalex-research-rag
      dockerfile: Dockerfile
    image: justin-portfolio-openalex-research-rag
    command: uv run streamlit run src/app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.baseUrlPath=projects/openalex-research-rag --server.enableCORS=false --server.enableXsrfProtection=false
    environment:
      PYTHONPATH: /app
      HF_HOME: /app/.cache/huggingface
      API_BASE_URL: http://openalex-research-rag-api:8000
    volumes:
      - ../openalex-research-rag/data:/app/data
      - ../openalex-research-rag/.cache:/app/.cache
    depends_on:
      - openalex-research-rag-api
    restart: unless-stopped

  retailpulse-bi-recommender-api:
    build:
      context: ../retailpulse-bi-recommender
      dockerfile: Dockerfile
    image: justin-portfolio-retailpulse-bi-recommender-api
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ../retailpulse-bi-recommender/data:/app/data
    restart: unless-stopped

  retailpulse-bi-recommender:
    build:
      context: ../retailpulse-bi-recommender/frontend
      dockerfile: Dockerfile
    image: justin-portfolio-retailpulse-bi-recommender
    environment:
      NEXT_PUBLIC_API_URL: http://retailpulse-bi-recommender-api:8000
      NEXT_PUBLIC_BASE_PATH: /p/retailpulse-bi-recommender
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - retailpulse-bi-recommender-api
    restart: unless-stopped

  news-web-crawler-api:
    build:
      context: ../news-web-crawler
      dockerfile: backend/Dockerfile
    image: justin-portfolio-news-web-crawler-api
    environment:
      NEWS_DATA_DIR: /data
      NEWS_DB_PATH: /data/news.db
      NEWS_CORS_ORIGINS: https://neojustin.dothost.net,http://localhost:3000,http://127.0.0.1:3000
      NEWS_LLM_ENABLED: "false"
    volumes:
      - ../news-web-crawler/data:/data
    restart: unless-stopped

  news-web-crawler:
    build:
      context: ../news-web-crawler
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /p/news-web-crawler/api/v1
        NEXT_PUBLIC_BASE_PATH: /p/news-web-crawler
    image: justin-portfolio-news-web-crawler
    depends_on:
      - news-web-crawler-api
    restart: unless-stopped

volumes:
  ir_hf_cache:
  amazon_review_hf_cache:
