server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS and resolve upstreams at request time via variables.
    # This makes nginx start even if a proxied demo container is missing/unreachable
    # (that route just returns 502 instead of crashing the whole web container).
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ---- agentic-bi-dataops-copilot ----
    location = /p/agentic-bi-dataops-copilot {
        return 301 /p/agentic-bi-dataops-copilot/;
    }
    location ^~ /p/agentic-bi-dataops-copilot/api/ {
        set $up "agentic-bi-dataops-copilot-api";
        rewrite ^/p/agentic-bi-dataops-copilot/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/agentic-bi-dataops-copilot/ {
        set $up "agentic-bi-dataops-copilot";
        rewrite ^/p/agentic-bi-dataops-copilot/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- information-retrieval (CNIRS) ----
    location = /projects/information-retrieval {
        return 301 /projects/information-retrieval/;
    }
    location ^~ /projects/information-retrieval/ {
        set $up "information-retrieval";
        rewrite ^/projects/information-retrieval/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # ---- fandom-gui-scraper ----
    location = /p/fandom-gui-scraper {
        return 301 /p/fandom-gui-scraper/;
    }
    location ^~ /p/fandom-gui-scraper/api/v1/ {
        set $up "fandom-gui-scraper";
        rewrite ^/p/fandom-gui-scraper/api/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/fandom-gui-scraper/frontend/ {
        set $up "fandom-gui-scraper";
        rewrite ^/p/fandom-gui-scraper/frontend/(.*)$ /frontend/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
    location ^~ /p/fandom-gui-scraper/ {
        set $up "fandom-gui-scraper";
        rewrite ^/p/fandom-gui-scraper/(.*)$ /app/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- nyc-taxi-mobility-analytics (Next.js basePath app; no nginx slash-redirect
    #      to avoid a loop with the app's trailingSlash:false redirect) ----
    location ^~ /p/nyc-taxi-mobility-analytics {
        set $up "nyc-taxi-mobility-analytics";
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- amazon-review-intelligence (Next.js basePath; no slash-redirect to avoid loop) ----
    location ^~ /p/amazon-review-intelligence/api/ {
        set $up "amazon-review-intelligence-api";
        rewrite ^/p/amazon-review-intelligence/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/amazon-review-intelligence {
        set $up "amazon-review-intelligence";
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- dcard-trending-crawler ----
    location = /p/dcard-trending-crawler {
        return 301 /p/dcard-trending-crawler/;
    }
    location ^~ /p/dcard-trending-crawler/api/ {
        set $up "dcard-trending-crawler-api";
        rewrite ^/p/dcard-trending-crawler/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/dcard-trending-crawler/ {
        set $up "dcard-trending-crawler";
        rewrite ^/p/dcard-trending-crawler/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- excel-python-data-analysis (Streamlit) ----
    location = /projects/excel-python-data-analysis {
        return 301 /projects/excel-python-data-analysis/;
    }
    location ^~ /projects/excel-python-data-analysis/ {
        set $up "excel-python-data-analysis";
        rewrite ^/projects/excel-python-data-analysis/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- ir-rag-evaluation-lab ----
    location = /projects/ir-rag-evaluation-lab {
        return 301 /projects/ir-rag-evaluation-lab/;
    }
    location ^~ /projects/ir-rag-evaluation-lab/api/v1/ {
        set $up "ir-rag-evaluation-lab-api";
        rewrite ^/projects/ir-rag-evaluation-lab/api/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /projects/ir-rag-evaluation-lab/ {
        set $up "ir-rag-evaluation-lab";
        rewrite ^/projects/ir-rag-evaluation-lab/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- lyrics-cultural-analytics-lab ----
    location = /p/lyrics-cultural-analytics-lab {
        return 301 /p/lyrics-cultural-analytics-lab/;
    }
    location ^~ /p/lyrics-cultural-analytics-lab/api/v1/ {
        set $up "lyrics-cultural-analytics-lab-backend";
        rewrite ^/p/lyrics-cultural-analytics-lab/api/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/lyrics-cultural-analytics-lab/ {
        set $up "lyrics-cultural-analytics-lab-frontend";
        rewrite ^/p/lyrics-cultural-analytics-lab/(.*)$ /$1 break;
        proxy_pass http://$up:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- music-intelligence-platform ----
    location = /projects/music-intelligence-platform {
        return 301 /projects/music-intelligence-platform/;
    }
    location ^~ /projects/music-intelligence-platform/api/ {
        set $up "music-intelligence-platform-api";
        rewrite ^/projects/music-intelligence-platform/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /projects/music-intelligence-platform/ {
        set $up "music-intelligence-platform";
        rewrite ^/projects/music-intelligence-platform/(.*)$ /$1 break;
        proxy_pass http://$up:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- openalex-research-rag (Streamlit) ----
    location = /projects/openalex-research-rag {
        return 301 /projects/openalex-research-rag/;
    }
    location ^~ /projects/openalex-research-rag/api/ {
        set $up "openalex-research-rag-api";
        rewrite ^/projects/openalex-research-rag/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /projects/openalex-research-rag/ {
        set $up "openalex-research-rag";
        proxy_pass http://$up:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- retailpulse-bi-recommender (Next.js basePath; no slash-redirect to avoid loop) ----
    location ^~ /p/retailpulse-bi-recommender/api/ {
        set $up "retailpulse-bi-recommender-api";
        rewrite ^/p/retailpulse-bi-recommender/api/(.*)$ /$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/retailpulse-bi-recommender {
        set $up "retailpulse-bi-recommender";
        # retailpulse now sets Next.js basePath -> forward the full URI (like amazon)
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- news-web-crawler ----
    location = /p/news-web-crawler {
        set $up "news-web-crawler";
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
    location ^~ /p/news-web-crawler/api/v1/ {
        set $up "news-web-crawler-api";
        rewrite ^/p/news-web-crawler/api/v1/(.*)$ /api/v1/$1 break;
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /p/news-web-crawler/ {
        set $up "news-web-crawler";
        proxy_pass http://$up:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # ---- legacy bare fandom routes (kept for compatibility) ----
    location ^~ /api/v1/ {
        set $up "fandom-gui-scraper";
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /frontend/ {
        set $up "fandom-gui-scraper";
        proxy_pass http://$up:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|webm|mp4|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
