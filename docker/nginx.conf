server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /p/agentic-bi-dataops-copilot {
        return 301 /p/agentic-bi-dataops-copilot/;
    }

    location ^~ /p/agentic-bi-dataops-copilot/api/ {
        proxy_pass http://agentic-bi-dataops-copilot-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location ^~ /p/agentic-bi-dataops-copilot/ {
        proxy_pass http://agentic-bi-dataops-copilot:80/;
        proxy_http_version 1.1;
