server {
  listen 80;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/wasm
    image/svg+xml
    font/woff
    font/woff2;

  root /usr/share/nginx/html;
  index index.html;

  # Project reverse-proxy gateway:
  # - Once a project is dockerized on the same compose network (service name == project slug),
  #   you can expose it at: https://neojustin.dothost.net/p/<slug>/
  #
  # Example future service:
  #   services:
  #     threejs-product-viewer:
  #       image: ...
  #       expose: ["80"]
  #
  # Then:
  #   /p/threejs-product-viewer/  -> http://threejs-product-viewer/
  #
  # Redirect legacy mixed-case slugs (Docker service names must be lowercase).
  location = /p/poker-AI-web { return 301 /p/poker-ai-web/; }
  location ^~ /p/poker-AI-web/ { return 301 /p/poker-ai-web/; }
  location = /p/YouTube-Web-Automation-Analysis { return 301 /p/youtube-web-automation-analysis/; }
  location ^~ /p/YouTube-Web-Automation-Analysis/ { return 301 /p/youtube-web-automation-analysis/; }
  location = /p/starforge-AI-narrative { return 301 /p/starforge-ai-narrative/; }
  location ^~ /p/starforge-AI-narrative/ { return 301 /p/starforge-ai-narrative/; }
  location = /p/charaforge-T2I-Lab { return 301 /p/charaforge-t2i-lab/; }
  location ^~ /p/charaforge-T2I-Lab/ { return 301 /p/charaforge-t2i-lab/; }
  location = /p/restoreAI-studio { return 301 /p/restoreai-studio/; }
  location ^~ /p/restoreAI-studio/ { return 301 /p/restoreai-studio/; }

  # Ensure all demo entrypoints end with a trailing slash so relative asset paths work.
  # Without this, visiting `/p/<slug>` makes the browser resolve `css/app.css` as `/p/css/app.css`.
  location ~ ^/p/(?<slug>[A-Za-z0-9._-]+)$ {
    return 301 /p/$slug/$is_args$args;
  }

  location ~ ^/p/(?<slug>[A-Za-z0-9._-]+)(?<rest>/.*)?$ {
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $upstream $slug;
    if ($rest = "") { set $rest "/"; }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Prefix /p/$slug;

    proxy_pass http://$upstream$rest;
  }

  # If the upstream project container is not running yet, show a friendly page.
  error_page 502 503 504 =200 /__project_not_ready.html;

  location / {
    # React SPA fallback
    try_files $uri $uri/ /index.html;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
